<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#d4a847">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fuglenクイズ">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fuglen バーテンダークイズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f17;--surface:#1a1a28;--card:#1e1e2e;
  --primary:#d4a847;--primary2:#e6c56b;
  --text:#f0ece3;--text2:#8a8a9a;--border:#2d2d42;
  --ok:#2dce89;--ng:#e74c3c;
  --ok-bg:rgba(45,206,137,.12);--ng-bg:rgba(231,76,60,.12);
  --radius:14px;
}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Sans','Noto Sans JP','Helvetica Neue',Arial,sans-serif;min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;padding:20px 16px 60px}
.wrap{width:100%;max-width:460px}
.card{background:var(--card);border-radius:20px;padding:28px 22px;box-shadow:0 4px 32px rgba(0,0,0,.5);border:1px solid var(--border)}
.hidden{display:none!important}

/* ── START ── */
.logo{text-align:center;margin-bottom:20px}
.logo-icon{font-size:48px;display:block;margin-bottom:6px}
.logo h1{font-size:20px;font-weight:700;color:var(--primary);letter-spacing:.04em}
.logo p{font-size:12px;color:var(--text2);margin-top:4px}
.stats-row{display:flex;gap:8px;margin-bottom:20px}
.stat-box{flex:1;background:var(--surface);border-radius:10px;padding:10px 6px;text-align:center;border:1px solid var(--border)}
.stat-box .num{font-size:20px;font-weight:700;color:var(--primary)}
.stat-box .lbl{font-size:10px;color:var(--text2);margin-top:2px}
/* Category grid */
.sec-label{font-size:12px;color:var(--text2);font-weight:700;letter-spacing:.08em;margin-bottom:10px;text-transform:uppercase}
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.cat-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;transition:all .18s;user-select:none}
.cat-card:hover{border-color:var(--primary);background:rgba(212,168,71,.06)}
.cat-card.active{border-color:var(--primary);background:rgba(212,168,71,.12);color:var(--primary)}
.cat-card .cat-icon{font-size:22px;display:block;margin-bottom:4px}
.cat-card .cat-name{font-size:10px;font-weight:700;line-height:1.3}
.cat-card .cat-count{font-size:10px;color:var(--text2);margin-top:3px}
.cat-card.active .cat-count{color:var(--primary)}
.cat-all{grid-column:1/-1;background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.cat-all:hover{border-color:var(--primary);background:rgba(212,168,71,.06)}
.cat-all.active{border-color:var(--primary);background:rgba(212,168,71,.12)}
.cat-all .cat-icon{font-size:22px}
.cat-all .cat-info .cat-name{font-size:13px;font-weight:700;text-align:left}
.cat-all .cat-info .cat-count{font-size:11px;color:var(--text2)}
.cat-all.active .cat-info .cat-count{color:var(--primary)}
/* mode */
.mode-btns{display:flex;gap:8px;margin-bottom:20px}
.mode-btn{flex:1;padding:10px 0;border:2px solid var(--border);background:transparent;color:var(--text2);border-radius:10px;font-size:13px;cursor:pointer;transition:all .2s;font-weight:700;font-family:inherit}
.mode-btn.active{border-color:var(--primary);color:var(--primary);background:rgba(212,168,71,.1)}
.mode-btn:disabled{opacity:.35;cursor:default}
.btn-primary{display:block;width:100%;padding:14px;background:var(--primary);color:#0f0f17;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;letter-spacing:.04em;font-family:inherit}
.btn-primary:hover{background:var(--primary2)}
.edit-link{display:block;text-align:center;margin-top:14px;color:var(--text2);font-size:13px;cursor:pointer;text-decoration:underline}

/* ── QUIZ ── */
.progress-bar-wrap{background:var(--border);border-radius:4px;height:6px;margin-bottom:18px;overflow:hidden}
.progress-bar{height:100%;background:var(--primary);border-radius:4px;transition:width .35s}
.q-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.type-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.04em}
.type-4択{background:rgba(212,168,71,.18);color:var(--primary)}
.type-記述{background:rgba(45,206,137,.18);color:#2dce89}
.type-画像{background:rgba(138,105,240,.18);color:#8a69f0}
.q-cat{font-size:12px;color:var(--text2)}
.q-num{font-size:12px;color:var(--text2);margin-left:auto}
.q-text{font-size:15px;font-weight:600;line-height:1.6;margin-bottom:18px}
/* Portrait image display */
.q-image-wrap{display:flex;justify-content:center;align-items:center;height:300px;background:var(--surface);border-radius:12px;padding:12px;border:1px solid var(--border);margin-bottom:18px}
.q-image-wrap img{max-height:276px;max-width:65%;width:auto;height:auto;object-fit:contain;border-radius:6px;display:block}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{width:100%;padding:13px 16px;text-align:left;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;cursor:pointer;transition:all .15s;line-height:1.4;font-family:inherit}
.choice:hover{border-color:var(--primary);color:var(--primary)}
.choice.ok{border-color:var(--ok)!important;background:var(--ok-bg)!important;color:var(--ok)!important;pointer-events:none}
.choice.ng{border-color:var(--ng)!important;background:var(--ng-bg)!important;color:var(--ng)!important;pointer-events:none}
.choice.dim{opacity:.38;pointer-events:none}
.text-area{display:flex;flex-direction:column;gap:10px}
.q-hint{font-size:12px;color:var(--text2);padding:8px 10px;background:var(--surface);border-radius:8px;border:1px solid var(--border)}
.q-hint::before{content:"💡 ";opacity:.7}
.text-input{width:100%;padding:13px 16px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;outline:none;font-family:inherit;transition:border-color .15s}
.text-input:focus{border-color:var(--primary)}
.text-input.ok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.text-input.ng{border-color:var(--ng);background:var(--ng-bg);color:var(--ng)}
.submit-btn{padding:12px;background:var(--surface);border:2px solid var(--primary);border-radius:var(--radius);color:var(--primary);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.submit-btn:hover{background:rgba(212,168,71,.12)}
.feedback{margin-top:14px;padding:12px 14px;border-radius:var(--radius);font-size:14px;line-height:1.5}
.feedback.ok{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(45,206,137,.3)}
.feedback.ng{background:var(--ng-bg);color:var(--ng);border:1px solid rgba(231,76,60,.3)}
.next-btn{display:none;margin-top:16px;width:100%;padding:13px;background:var(--primary);color:#0f0f17;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.next-btn:hover{background:var(--primary2)}
.quiz-back-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:4px 10px;font-size:16px;cursor:pointer;line-height:1;transition:all .15s;flex-shrink:0}
.quiz-back-btn:hover{border-color:var(--primary);color:var(--primary)}
/* ── RECIPE TEST ── */
.recipe-section-label{font-size:12px;color:var(--text2);font-weight:700;letter-spacing:.08em;margin:16px 0 6px;text-transform:uppercase}
.recipe-intro{font-size:11px;color:var(--text2);margin-bottom:10px}
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.recipe-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:10px 12px;cursor:pointer;transition:all .18s;user-select:none}
.recipe-card:hover{border-color:var(--primary);background:rgba(212,168,71,.08)}
.recipe-name-ja{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.recipe-name-en{font-size:10px;color:var(--text2);margin-top:2px}


/* ── RESULT ── */
.result-icon{font-size:56px;text-align:center;margin-bottom:10px}
.result-title{font-size:22px;font-weight:700;text-align:center;color:var(--primary);margin-bottom:6px}
.result-score{font-size:40px;font-weight:700;text-align:center;margin-bottom:4px}
.result-pct{font-size:14px;color:var(--text2);text-align:center;margin-bottom:20px}
.result-table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px}
.result-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.result-table td:last-child{text-align:right;color:var(--primary);font-weight:700}
.result-msg{background:var(--surface);border-radius:var(--radius);padding:14px;font-size:14px;line-height:1.55;color:var(--text2);text-align:center;margin-bottom:18px;border:1px solid var(--border)}
.btn-row{display:flex;gap:10px}
.btn-secondary{flex:1;padding:13px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}

/* ── EDIT ── */
.edit-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;line-height:1;padding:4px}
.edit-header h2{font-size:18px;font-weight:700}
.edit-header .count{font-size:13px;color:var(--text2);margin-left:auto}
.q-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;max-height:50vh;overflow-y:auto}
.q-item{background:var(--surface);border-radius:10px;padding:12px 14px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
.q-item-body{flex:1;min-width:0}
.q-item-type{font-size:10px;font-weight:700;color:var(--primary);margin-bottom:2px}
.q-item-cat{font-size:10px;color:var(--text2);margin-bottom:3px}
.q-item-q{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-item-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px;transition:all .15s;font-family:inherit}
.icon-btn:hover{border-color:var(--primary);color:var(--primary)}
.icon-btn.del:hover{border-color:var(--ng);color:var(--ng)}
.add-btn{width:100%;padding:12px;background:transparent;border:2px dashed var(--border);border-radius:var(--radius);color:var(--primary);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-bottom:10px}
.add-btn:hover{border-color:var(--primary);background:rgba(212,168,71,.06)}
.reset-btn{width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.reset-btn:hover{border-color:var(--ng);color:var(--ng)}

/* ── MODAL ── */
#modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:460px;max-height:92dvh;overflow-y:auto;border-top:1px solid var(--border)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px;color:var(--primary)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;background:var(--surface);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.field input:focus,.field textarea:focus{border-color:var(--primary)}
.field select{cursor:pointer}
.field select option{background:var(--card)}
.field textarea{resize:vertical;min-height:60px}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.modal-btns .btn-primary{flex:1}
.modal-cancel{flex:1;padding:13px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
/* ── PASSWORD ── */
#pwScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:999}
.pw-card{background:var(--card);border-radius:20px;padding:36px 28px;width:100%;max-width:360px;text-align:center;border:1px solid var(--border);box-shadow:0 4px 32px rgba(0,0,0,.6)}
.pw-logo{font-size:44px;margin-bottom:10px}
.pw-title{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:4px}
.pw-sub{font-size:12px;color:var(--text2);margin-bottom:28px}
.pw-input{width:100%;padding:14px 16px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:18px;text-align:center;letter-spacing:.2em;outline:none;font-family:inherit;margin-bottom:12px;transition:border-color .15s}
.pw-input:focus{border-color:var(--primary)}
.pw-input.shake{animation:shake .35s}
.pw-err{font-size:12px;color:var(--ng);min-height:18px;margin-bottom:12px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
/* ── TEXTBOOK ── */
.tb-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.tb-header h2{font-size:18px;font-weight:700;color:var(--primary)}
.tb-section{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tb-sec-title{width:100%;padding:13px 16px;background:var(--surface);border:none;color:var(--text);font-size:14px;font-weight:700;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;font-family:inherit;transition:background .15s}
.tb-sec-title:hover{background:rgba(212,168,71,.08)}
.tb-sec-title .tb-arrow{font-size:12px;color:var(--text2);transition:transform .2s}
.tb-sec-title.open .tb-arrow{transform:rotate(90deg)}
.tb-sec-body{display:none;padding:14px 16px;background:var(--card);border-top:1px solid var(--border)}
.tb-sec-body.open{display:block}

/* recipe card in textbook */
.tb-recipe{margin-bottom:20px}
.tb-recipe:last-child{margin-bottom:0}
.tb-recipe-name{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:2px}
.tb-recipe-name-en{font-size:11px;color:var(--text2);margin-bottom:10px}
.tb-row{display:flex;gap:6px;margin-bottom:6px;font-size:13px;line-height:1.5}
.tb-label{color:var(--text2);flex-shrink:0;width:68px;font-size:12px;font-weight:600}
.tb-value{color:var(--text);flex:1}
.tb-ing-list{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.tb-ing-row{display:flex;align-items:baseline;gap:6px;font-size:13px}
.tb-ing-name{flex:1;color:var(--text)}
.tb-ing-amt{color:var(--primary);font-weight:700;font-size:12px;flex-shrink:0}
.tb-note{font-size:11px;color:var(--text2);margin-top:6px;padding:6px 10px;background:var(--surface);border-radius:8px;border-left:3px solid var(--primary)}
.tb-divider{height:1px;background:var(--border);margin:16px 0}

/* glossary */
.tb-gloss-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.tb-gloss-row:last-child{border-bottom:none}
.tb-gloss-en{color:var(--primary);font-weight:700;width:80px;flex-shrink:0}
.tb-gloss-ja{width:100px;flex-shrink:0;color:var(--text)}
.tb-gloss-desc{color:var(--text2);flex:1;font-size:12px}

/* glass table */
/* glass cards in textbook */
.tb-glass-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tb-glass-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.tb-glass-card img{width:auto;height:120px;object-fit:contain;display:block;margin:0 auto 8px}
.tb-glass-card .tb-glass-no-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--text2)}
.tb-glass-card .tb-glass-en{font-size:11px;color:var(--primary);font-weight:700;display:block;margin-bottom:2px}
.tb-glass-card .tb-glass-ja{font-size:11px;color:var(--text);display:block;margin-bottom:3px}
.tb-glass-card .tb-glass-desc{font-size:10px;color:var(--text2)}


/* textbook open button on home */
.textbook-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;background:transparent;border:2px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:10px}
.textbook-btn:hover{border-color:var(--primary);color:var(--primary)}

.textbook-btn:hover{border-color:var(--primary);color:var(--primary)}

</style>
</head>
<body>
<!-- PASSWORD -->
<div id="pwScreen">
  <div class="pw-card">
    <div class="pw-logo">🍸</div>
    <div class="pw-title">Fuglen バーテンダークイズ</div>
    <div class="pw-sub">スタッフ専用アプリ</div>
    <input id="pwInput" class="pw-input" type="password" placeholder="パスワード" maxlength="20" autocomplete="off">
    <div class="pw-err" id="pwErr"></div>
    <button class="btn-primary" onclick="checkPw()">ログイン</button>
  </div>
</div>

<div class="wrap">

<!-- START -->
<div id="startScreen" class="card">
  <div class="logo">
    <span class="logo-icon">🍸</span>
    <h1>Fuglen バーテンダークイズ</h1>
    <p>カクテルレシピ・技法・用語を学ぼう</p>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="num" id="statTotal">—</div><div class="lbl">選択中の問題数</div></div>
    <div class="stat-box"><div class="num" id="statLast">—</div><div class="lbl">前回スコア</div></div>
  </div>
  <div class="sec-label">カテゴリを選択</div>
  <div class="cat-grid" id="catGrid"></div>
  <div class="cat-all" id="catAll" onclick="selectCat('all')">
    <span class="cat-icon">🎲</span>
    <div class="cat-info">
      <div class="cat-name">全カテゴリ（ランダム）</div>
      <div class="cat-count" id="catAllCount">0問</div>
    </div>
  </div>
  <div class="recipe-section-label">&#127378; カクテルレシピテスト</div>
  <div class="recipe-intro">カクテルを選んで全項目（材料・容量・グラス・技法・ガーニッシュ）を集中テスト</div>
  <div class="recipe-grid" id="recipeGrid"></div>
  <div class="sec-label">出題数を選択</div>
  <div class="mode-btns">
    <button class="mode-btn active" onclick="selectMode(10)">10問</button>
    <button class="mode-btn" onclick="selectMode(20)">20問</button>
    <button class="mode-btn" onclick="selectMode(30)">30問</button>
    <button class="mode-btn" onclick="selectMode(999)">全問</button>
  </div>
  <button class="btn-primary" onclick="startQuiz()">クイズスタート 🍹</button>
  <button class="textbook-btn" onclick="showTextbook()">&#128218; 教科書を開く（全レシピ・用語集）</button>
  <button class="textbook-btn" onclick="showTextbook()">&#128218; 教科書を開く（全レシピ・用語集）</button>
  <span class="edit-link" onclick="showEditScreen()">問題を編集する</span>
</div>

<!-- QUIZ -->
<div id="quizScreen" class="card hidden">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="q-header">
    <button class="quiz-back-btn" onclick="confirmBack()" title="ホームに戻る">&#8592;</button>
    <span class="type-badge" id="typeBadge"></span>
    <span class="q-cat" id="qCat"></span>
    <span class="q-num" id="qNum"></span>
  </div>
  <div class="q-text" id="qText"></div>
  <div class="q-image-wrap hidden" id="qImageWrap">
    <img id="qImage" src="" alt="グラス画像">
  </div>
  <div class="choices" id="choicesArea"></div>
  <div class="text-area hidden" id="textArea">
    <div class="q-hint hidden" id="qHint"></div>
    <input type="text" class="text-input" id="textInput" placeholder="回答を入力…">
    <button class="submit-btn" onclick="submitText()">回答する</button>
  </div>
  <div class="feedback hidden" id="feedbackBox"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQ()">次の問題 →</button>
</div>

<!-- RESULT -->
<div id="resultScreen" class="card hidden">
  <div class="result-icon" id="resultIcon"></div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-pct" id="resultPct"></div>
  <table class="result-table" id="resultTable"></table>
  <div class="result-msg" id="resultMsg"></div>
  <div class="btn-row">
    <button class="btn-secondary" onclick="goStart()">← トップへ</button>
    <button class="btn-primary" style="flex:1" onclick="retryQuiz()">もう一度</button>
  </div>
</div>


<!-- TEXTBOOK -->
<div id="textbookScreen" class="card hidden">
  <div class="tb-header">
    <button class="back-btn" onclick="hideTextbook()">&#8592;</button>
    <h2>&#128218; 教科書</h2>
  </div>
  <div id="tbContent"></div>
</div>


<!-- TEXTBOOK -->
<div id="textbookScreen" class="card hidden">
  <div class="tb-header">
    <button class="back-btn" onclick="hideTextbook()">&#8592;</button>
    <h2>&#128218; 教科書</h2>
  </div>
  <div id="tbContent"></div>
</div>

<!-- EDIT -->
<div id="editScreen" class="card hidden">
  <div class="edit-header">
    <button class="back-btn" onclick="hideEditScreen()">←</button>
    <h2>問題を編集</h2>
    <span class="count" id="editCount"></span>
  </div>
  <div class="q-list" id="qList"></div>
  <button class="add-btn" onclick="openAddModal()">＋ 問題を追加</button>
  <button class="reset-btn" onclick="resetQB()">デフォルトに戻す</button>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="hidden">
  <div class="modal">
    <h3 id="modalTitle">問題を追加</h3>
    <div class="field"><label>種別</label>
      <select id="mType" onchange="onTypeChange()">
        <option value="4択">4択</option><option value="記述">記述</option>
      </select>
    </div>
    <div class="field"><label>カテゴリ</label>
      <select id="mCat">
        <option>🥃 グラス</option><option>🍸 カクテル名</option>
        <option>🍋 材料</option><option>📏 容量</option>
        <option>🔧 技法</option><option>🌿 ガーニッシュ</option>
        <option>📖 用語</option><option>💡 備考</option>
      </select>
    </div>
    <div class="field"><label>問題文</label><textarea id="mQ" rows="3"></textarea></div>
    <div id="choicesFields">
      <div class="field"><label>選択肢 A</label><input type="text" id="mC0"></div>
      <div class="field"><label>選択肢 B</label><input type="text" id="mC1"></div>
      <div class="field"><label>選択肢 C</label><input type="text" id="mC2"></div>
      <div class="field"><label>選択肢 D</label><input type="text" id="mC3"></div>
      <div class="field"><label>正解（選択肢と完全一致）</label><input type="text" id="mAns4"></div>
    </div>
    <div id="textFields" class="hidden">
      <div class="field"><label>正解（複数可、カンマ区切り）</label><input type="text" id="mAnsT"></div>
      <div class="field"><label>ヒント（任意）</label><input type="text" id="mHint"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>

</div><!-- /wrap -->

const LS_KEY   = 'fuglenQB2';
const LS_SCORE = 'fuglenScore2';
let QB = [], questions = [], idx = 0, mode = 10;
let selCat = 'all';
let okCount=0,ngCount=0,mcOk=0,mcNg=0,txOk=0,txNg=0,imgOk=0,imgNg=0;
let editIdx = -1;

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
function init() {
  const saved = localStorage.getItem(LS_KEY);
  QB = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_QB));
  buildCatGrid();
  buildRecipeGrid();
  selectCat('all');
  updateLastScore();
  show('startScreen');
}
function saveQB() { localStorage.setItem(LS_KEY, JSON.stringify(QB)); }
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

/* ─────────────────────────────────────────
   CATEGORY GRID
───────────────────────────────────────── */
function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATS.filter(c => c.key !== 'all').forEach(c => {
    const count = QB.filter(c.filter).length;
    const div = document.createElement('div');
    div.className = 'cat-card' + (selCat === c.key ? ' active' : '');
    div.dataset.key = c.key;
    div.innerHTML = `<span class="cat-icon">${c.icon}</span><div class="cat-name">${c.name}</div><div class="cat-count">${count}問</div>`;
    div.onclick = () => selectCat(c.key);
    grid.appendChild(div);
  });
  // all count
  document.getElementById('catAllCount').textContent = QB.length + '問';
  document.getElementById('catAll').className = 'cat-all' + (selCat === 'all' ? ' active' : '');
}
function selectCat(key) {
  selCat = key;
  // update UI
  document.querySelectorAll('.cat-card').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });
  document.getElementById('catAll').classList.toggle('active', key === 'all');
  // update available count
  const filtered = getFilteredQB();
  document.getElementById('statTotal').textContent = filtered.length + '問';
  updateModeButtons(filtered.length);
}
function getFilteredQB() {
  if (selCat === 'all') return QB;
  const cat = CATS.find(c => c.key === selCat);
  return cat ? QB.filter(cat.filter) : QB;
}
function updateModeButtons(available) {
  const modes = [10, 20, 30, 999];
  document.querySelectorAll('.mode-btn').forEach((btn, i) => {
    const m = modes[i];
    btn.disabled = m !== 999 && m > available;
    if (btn.disabled && btn.classList.contains('active')) {
      btn.classList.remove('active');
      // select first valid
      document.querySelectorAll('.mode-btn:not(:disabled)')[0]?.classList.add('active');
      mode = modes[document.querySelectorAll('.mode-btn:not(:disabled)')[0]
        ? [...document.querySelectorAll('.mode-btn')].indexOf(document.querySelectorAll('.mode-btn:not(:disabled)')[0]) : 0];
    }
  });
}
function updateLastScore() {
  const s = localStorage.getItem(LS_SCORE);
  document.getElementById('statLast').textContent = s || '—';
}
function selectMode(n) {
  mode = n;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', [10,20,30,999][i] === n);
  });
}

function buildRecipeGrid() {
  const grid = document.getElementById('recipeGrid');
  if (!grid) return;
  grid.innerHTML = '';
  COCKTAILS.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'recipe-card';
    div.innerHTML = '<div class="recipe-name-ja">'+c.ja+'</div><div class="recipe-name-en">'+c.en+'</div>';
    div.onclick = () => startRecipeTest(i);
    grid.appendChild(div);
  });
}

function generateRecipeQuestions(ci) {
  const c = COCKTAILS[ci];
  const qs = [];
  const allGlasses  = [...new Set(COCKTAILS.map(x=>x.glassJa))];
  const allTechs    = [...new Set(COCKTAILS.map(x=>x.techJa))];
  const allGarnish  = [...new Set(COCKTAILS.map(x=>x.garnishJa))];
  const cat = '🍸 レシピ: ' + c.ja;

  function sh(a){return [...a].sort(()=>Math.random()-.5);}
  function w3(correct,pool){return sh(pool.filter(v=>v!==correct)).slice(0,3);}
  function mk4(q,ans,wrongs){
    return {t:'4択',cat,q,ch:sh([ans,...wrongs.slice(0,3)]),ans};
  }

  // ① グラス
  qs.push(mk4('「'+c.ja+'」に使用するグラスは？', c.glassJa, w3(c.glassJa,allGlasses)));

  // ② 技法
  qs.push(mk4('「'+c.ja+'」の技法は？', c.techJa, w3(c.techJa,allTechs)));

  // ③ ガーニッシュ
  qs.push(mk4('「'+c.ja+'」のガーニッシュは？', c.garnishJa, w3(c.garnishJa,allGarnish)));

  // ④ 材料種類数
  const totalIngs = c.ings.length;
  const cntWrong = [totalIngs-1,totalIngs+1,totalIngs+2]
    .filter(n=>n>0&&n!==totalIngs).slice(0,3).map(n=>n+'種類');
  qs.push(mk4('「'+c.ja+'」の材料は全部で何種類？', totalIngs+'種類', cntWrong));

  // ⑤ 含まれない材料はどれ？
  const ingNames = c.ings.map(i=>i.n);
  const foreignIngs = COCKTAILS.flatMap(x=>x.ings.map(i=>i.n)).filter(n=>!ingNames.includes(n));
  const fakeIng = sh(foreignIngs)[0];
  const realPick = sh(ingNames).slice(0,3);
  qs.push({t:'4択',cat,
    q:'「'+c.ja+'」の材料に含まれないものはどれ？',
    ch:sh([...realPick,fakeIng]),ans:fakeIng});

  // ⑥ 各材料の量
  c.ings.filter(i=>i.a!=='適量').forEach(ing=>{
    const a = ing.a;
    let wrongs = AMOUNT_WRONGS[a] || ['30ml','20ml','15ml'];
    wrongs = sh(wrongs.filter(v=>v!==a)).slice(0,3);
    if(wrongs.length<3){
      const fill=['30ml','20ml','15ml','40ml'].filter(v=>v!==a&&!wrongs.includes(v));
      wrongs=[...wrongs,...fill].slice(0,3);
    }
    qs.push(mk4('「'+c.ja+'」の'+ing.n+'の量は？', a, wrongs));
  });

  // ⑦ 備考（あれば記述式）
  if(c.notes){
    qs.push({t:'記述',cat,
      q:'「'+c.ja+'」の備考・注意事項は？',
      ans:[c.notes],hint:'このカクテル特有の準備・注意点'});
  }
  return qs;
}

function startQuiz() {
  const pool = getFilteredQB();
  if (pool.length === 0) { alert('この カテゴリに問題がありません'); return; }
  const shuffled = [...pool].sort(() => Math.random() - .5);
  questions = shuffled.slice(0, mode === 999 ? pool.length : Math.min(mode, pool.length));
  idx=0;okCount=0;ngCount=0;mcOk=0;mcNg=0;txOk=0;txNg=0;imgOk=0;imgNg=0;
  hide('startScreen'); show('quizScreen'); renderQ();
}

function renderQ() {
  const q = questions[idx], total = questions.length;
  document.getElementById('progressBar').style.width = (idx / total * 100) + '%';
  document.getElementById('qNum').textContent = `${idx+1} / ${total}`;
  const badge = document.getElementById('typeBadge');
  badge.textContent = q.t; badge.className = 'type-badge type-' + q.t;
  document.getElementById('qCat').textContent = q.cat;
  document.getElementById('qText').textContent = q.q;
  // Image
  const imgWrap = document.getElementById('qImageWrap');
  if (q.t === '画像' && q.img && GLASS_IMAGES[q.img]) {
    document.getElementById('qImage').src = GLASS_IMAGES[q.img];
    imgWrap.classList.remove('hidden');
  } else { imgWrap.classList.add('hidden'); }
  hide('feedbackBox');
  document.getElementById('nextBtn').style.display = 'none';
  if (q.t === '記述') {
    hide('choicesArea'); show('textArea');
    const hintEl = document.getElementById('qHint');
    if (q.hint) { hintEl.textContent = q.hint; hintEl.classList.remove('hidden'); }
    else { hintEl.classList.add('hidden'); }
    const inp = document.getElementById('textInput');
    inp.value = ''; inp.className = 'text-input'; inp.disabled = false; inp.focus();
  } else {
    show('choicesArea'); hide('textArea');
    const area = document.getElementById('choicesArea');
    area.innerHTML = '';
    [...q.ch].sort(() => Math.random() - .5).forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'choice'; btn.textContent = ch;
      btn.onclick = () => pickChoice(btn, ch);
      area.appendChild(btn);
    });
  }
}

function pickChoice(btn, val) {
  const q = questions[idx], isOk = val === q.ans;
  const type = q.t === '画像' ? 'img' : 'mc';
  document.querySelectorAll('.choice').forEach(b => {
    if (b === btn) b.classList.add(isOk ? 'ok' : 'ng');
    else if (b.textContent === q.ans) b.classList.add('ok');
    else b.classList.add('dim');
  });
  record(isOk, type); showFB(isOk, q.ans);
}
function submitText() {
  const q = questions[idx], inp = document.getElementById('textInput');
  const val = inp.value.trim().toLowerCase();
  const answers = Array.isArray(q.ans) ? q.ans : [q.ans];
  const isOk = answers.some(a => a.toLowerCase() === val);
  inp.disabled = true; inp.classList.add(isOk ? 'ok' : 'ng');
  record(isOk, 'tx'); showFB(isOk, answers[0]);
}
function record(isOk, type) {
  if(isOk){okCount++;if(type==='mc')mcOk++;else if(type==='tx')txOk++;else imgOk++;}
  else{ngCount++;if(type==='mc')mcNg++;else if(type==='tx')txNg++;else imgNg++;}
}
function showFB(isOk, correct) {
  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback ' + (isOk ? 'ok' : 'ng');
  fb.textContent = isOk ? '✓ 正解！' : '✗ 不正解。正解：' + correct;
  fb.classList.remove('hidden');
  document.getElementById('nextBtn').style.display = 'block';
}
function nextQ() { idx++; if(idx >= questions.length) showResult(); else renderQ(); }

function showResult() {
  hide('quizScreen');
  const total = questions.length, pct = Math.round(okCount/total*100);
  localStorage.setItem(LS_SCORE, `${okCount}/${total} (${pct}%)`);
  document.getElementById('resultIcon').textContent = pct>=90?'🏆':pct>=70?'⭐':pct>=50?'📖':'💪';
  document.getElementById('resultTitle').textContent = pct>=90?'パーフェクト！':pct>=70?'よくできました！':pct>=50?'もう少し！':'要復習！';
  document.getElementById('resultScore').textContent = `${okCount} / ${total}`;
  document.getElementById('resultPct').textContent = `正解率 ${pct}%`;
  const rows = [];
  if(mcOk+mcNg>0) rows.push(['🍸 4択',mcOk,mcOk+mcNg]);
  if(imgOk+imgNg>0) rows.push(['🥃 画像',imgOk,imgOk+imgNg]);
  if(txOk+txNg>0) rows.push(['✏️ 記述',txOk,txOk+txNg]);
  document.getElementById('resultTable').innerHTML = rows.map(([l,ok,tot])=>
    `<tr><td>${l}</td><td>${ok} / ${tot}問</td><td>${Math.round(ok/tot*100)}%</td></tr>`
  ).join('');
  const msg = pct>=90?'すばらしい！バーテンダーとして完璧な知識です 🍸':
    pct>=70?'よくできました！もう少しで完璧です 🥂':
    pct>=50?'基礎はできています。繰り返し練習しましょう 📚':
    '諦めないで！カクテルレシピを見直してから再挑戦しよう 💪';
  document.getElementById('resultMsg').textContent = msg;
  show('resultScreen');
}
function goStart(){hide('resultScreen');updateLastScore();buildCatGrid();selectCat(selCat);show('startScreen');}
function retryQuiz(){
  hide('resultScreen');idx=0;okCount=0;ngCount=0;mcOk=0;mcNg=0;txOk=0;txNg=0;imgOk=0;imgNg=0;
  questions=[...questions].sort(()=>Math.random()-.5);show('quizScreen');renderQ();
}

/* ─────────────────────────────────────────
   EDIT
───────────────────────────────────────── */
function showEditScreen(){hide('startScreen');renderQList();show('editScreen');}
function hideEditScreen(){hide('editScreen');buildCatGrid();selectCat(selCat);show('startScreen');}
function renderQList(){
  document.getElementById('editCount').textContent = QB.length+'問';
  document.getElementById('qList').innerHTML = QB.map((q,i)=>`
    <div class="q-item">
      <div class="q-item-body">
        <div class="q-item-type">${q.t}</div>
        <div class="q-item-cat">${q.cat}</div>
        <div class="q-item-q">${q.q}</div>
      </div>
      <div class="q-item-actions">
        <button class="icon-btn" onclick="openEditModal(${i})">編集</button>
        <button class="icon-btn del" onclick="deleteQ(${i})">削除</button>
      </div>
    </div>`).join('');
}
function deleteQ(i){if(!confirm('削除しますか？'))return;QB.splice(i,1);saveQB();renderQList();}
function resetQB(){if(!confirm('デフォルトに戻しますか？'))return;QB=JSON.parse(JSON.stringify(DEFAULT_QB));saveQB();renderQList();}
function openAddModal(){
  editIdx=-1;document.getElementById('modalTitle').textContent='問題を追加';
  document.getElementById('mType').value='4択';
  document.getElementById('mCat').value='🥃 グラス';
  document.getElementById('mQ').value='';
  ['mC0','mC1','mC2','mC3','mAns4','mAnsT','mHint'].forEach(id=>document.getElementById(id).value='');
  onTypeChange();show('modalOverlay');
}
function openEditModal(i){
  editIdx=i;const q=QB[i];
  document.getElementById('modalTitle').textContent='問題を編集';
  document.getElementById('mType').value=(q.t==='画像'?'4択':q.t);
  document.getElementById('mCat').value=q.cat;
  document.getElementById('mQ').value=q.q;
  if(q.t!=='記述'){
    const ch=q.ch||[];
    ['mC0','mC1','mC2','mC3'].forEach((id,j)=>document.getElementById(id).value=ch[j]||'');
    document.getElementById('mAns4').value=q.ans||'';
  }else{
    document.getElementById('mAnsT').value=(Array.isArray(q.ans)?q.ans.join(', '):q.ans)||'';
    document.getElementById('mHint').value=q.hint||'';
  }
  onTypeChange();show('modalOverlay');
}
function onTypeChange(){
  const t=document.getElementById('mType').value;
  document.getElementById('choicesFields').classList.toggle('hidden',t==='記述');
  document.getElementById('textFields').classList.toggle('hidden',t!=='記述');
}
function closeModal(){hide('modalOverlay');}
function saveModal(){
  const t=document.getElementById('mType').value,cat=document.getElementById('mCat').value;
  const q=document.getElementById('mQ').value.trim();
  if(!q){alert('問題文を入力してください');return;}
  let obj;
  if(t==='4択'){
    const ch=['mC0','mC1','mC2','mC3'].map(id=>document.getElementById(id).value.trim()).filter(Boolean);
    const ans=document.getElementById('mAns4').value.trim();
    if(ch.length<2){alert('選択肢を2つ以上入力してください');return;}
    if(!ans){alert('正解を入力してください');return;}
    obj={t:'4択',cat,q,ch,ans};
  }else{
    const rawAns=document.getElementById('mAnsT').value.trim();
    if(!rawAns){alert('正解を入力してください');return;}
    const ans=rawAns.split(',').map(s=>s.trim()).filter(Boolean);
    const hint=document.getElementById('mHint').value.trim();
    obj={t:'記述',cat,q,ans};if(hint)obj.hint=hint;
  }
  if(editIdx>=0)QB[editIdx]=obj;else QB.push(obj);
  saveQB();closeModal();renderQList();
}
document.getElementById('textInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitText();});

/* ── PASSWORD ── */
const PW = 'fuglen';
function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === PW) {
    sessionStorage.setItem('auth','1');
    document.getElementById('pwScreen').style.display='none';
    init();
  } else {
    const inp = document.getElementById('pwInput');
    document.getElementById('pwErr').textContent = 'パスワードが違います';
    inp.classList.add('shake');
    inp.value='';
    setTimeout(()=>inp.classList.remove('shake'),400);
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
if (sessionStorage.getItem('auth')==='1') {
  document.getElementById('pwScreen').style.display='none'; init();
}
